<!DOCTYPE html>
<html>
<head><title>Neuer Post</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div class="container mt-5">
    <h1>Neuen Post erstellen</h1>
    <form method="POST">
        <div class="mb-3">
            <label>Titel</label>
            <input type="text" name="title" class="form-control" required>
        </div>
        <div class="mb-3">
            <label>Inhalt</label>
            <textarea name="content" class="form-control" rows="10" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Veröffentlichen</button>
        <a href="/" class="btn btn-secondary">Abbrechen</a>
    </form>
</div>
</body>
</html>
