<!DOCTYPE html>
<html>
<head><title>Mein Blog</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<div class="container mt-5">
    <h1 class="mb-4">📝 Mein Blog</h1>
    <a href="/new" class="btn btn-primary mb-3">Neuer Post</a>
    <div class="list-group">
        {% for id, title, created in posts %}
        <a href="/post/{{ id }}" class="list-group-item list-group-item-action">
            <strong>{{ title }}</strong><br>
            <small class="text-muted">{{ created[:16] }}</small>
        </a>
        {% endfor %}
    </div>
</div>
</body>
</html>
